function byteToDotRows(num) {
 if( isNaN(num) || num < 0 || num > 255 ) {
  throw Error("no.");
 }
 const brailleBitOrder = [ 7, 4, 6, 3, 5, 2, 1, 0 ];
 const rowsBits = num.toString(2).padStart(8,'0');
 const brailleBits = Array(8);
 for ( let i = 0; i < 8; i++ ) {
  let bit = rowsBits.charAt(i);
  brailleBits[brailleBitOrder[i]] = bit;
 }
 const uninum = parseInt(brailleBits.join(''),2);
 return String.fromCodePoint(10240 + uninum)
}
